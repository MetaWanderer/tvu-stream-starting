<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>TVU GO — Stream Starting Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #050508;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
  }

  .screen {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #050508;
  }

  /* ── Canvas (particles + bokeh + scan) ── */
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 1920px; height: 1080px;
  }

  /* ── Circuit grid ── */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(51,226,51,0.016) 1px, transparent 1px),
      linear-gradient(90deg, rgba(51,226,51,0.016) 1px, transparent 1px);
    background-size: 80px 80px;
    animation: gridPulse 8s ease-in-out infinite;
  }
  @keyframes gridPulse {
    0%, 100% { opacity: 0.7; }
    50%       { opacity: 1.3; }
  }

  /* ── CRT scanlines ── */
  .crt {
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px
    );
    pointer-events: none;
  }

  /* ── Vignette ── */
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 88% 85% at 50% 50%, transparent 45%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
  }

  /* ── Center content ── */
  .center {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    animation: fadeIn 1.4s ease-out forwards;
    opacity: 0;
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* ── Eyebrow ── */
  .eyebrow {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.46em;
    color: rgba(255,255,255,0.32);
    text-transform: uppercase;
    margin-bottom: 36px;
    animation: eyebrowFloat 8s ease-in-out infinite 1.4s;
  }
  @keyframes eyebrowFloat {
    0%, 100% { opacity: 0.32; letter-spacing: 0.46em; }
    50%       { opacity: 0.50; letter-spacing: 0.50em; }
  }

  /* ── Main headline ── */
  .headline-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 52px;
  }

  /* Glow panel behind text */
  .text-glow {
    position: absolute;
    inset: -30px -60px;
    border-radius: 24px;
    background: rgba(51,226,51,0.03);
    border: 1px solid rgba(51,226,51,0.08);
    animation: panelPulse 6s ease-in-out infinite;
  }
  @keyframes panelPulse {
    0%, 100% { box-shadow: 0 0 60px rgba(51,226,51,0.06); border-color: rgba(51,226,51,0.08); }
    50%       { box-shadow: 0 0 120px rgba(51,226,51,0.14); border-color: rgba(51,226,51,0.18); }
  }

  .headline-line1 {
    position: relative;
    font-size: 108px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #ffffff;
    line-height: 1.0;
    text-shadow: 0 0 80px rgba(255,255,255,0.12);
  }
  .headline-line2 {
    position: relative;
    font-size: 108px;
    font-weight: 300;
    letter-spacing: -0.02em;
    color: #33e233;
    line-height: 1.0;
    text-shadow: 0 0 100px rgba(51,226,51,0.5), 0 0 200px rgba(51,226,51,0.2);
    animation: greenGlow 5s ease-in-out infinite;
  }
  @keyframes greenGlow {
    0%, 100% { text-shadow: 0 0 80px rgba(51,226,51,0.4), 0 0 160px rgba(51,226,51,0.15); opacity: 0.9; }
    50%       { text-shadow: 0 0 120px rgba(51,226,51,0.65), 0 0 240px rgba(51,226,51,0.25); opacity: 1.0; }
  }

  /* ── Separator ── */
  .separator {
    width: 360px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(51,226,51,0.35), transparent);
    margin-bottom: 44px;
    animation: sepBreathe 8s ease-in-out infinite;
  }
  @keyframes sepBreathe {
    0%, 100% { width: 320px; opacity: 0.7; }
    50%       { width: 420px; opacity: 1.0; }
  }

  /* ── Logo lockup ── */
  .logo-lockup {
    display: flex;
    align-items: center;
    gap: 18px;
    animation: logoFloat 9s ease-in-out infinite 1.4s;
  }
  @keyframes logoFloat {
    0%, 100% { transform: translateY(0px);  }
    50%       { transform: translateY(-4px); }
  }
  .logo-img {
    width: 52px; height: 52px;
    filter: drop-shadow(0 0 14px rgba(51,226,51,0.6));
    animation: logoGlow 5s ease-in-out infinite;
  }
  @keyframes logoGlow {
    0%, 100% { filter: drop-shadow(0 0 10px rgba(51,226,51,0.45)); }
    50%       { filter: drop-shadow(0 0 22px rgba(51,226,51,0.75)); }
  }
  .logo-text {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 0.36em;
    color: #ffffff;
    text-transform: uppercase;
    text-shadow: 0 0 30px rgba(255,255,255,0.2);
  }

  /* ── Bottom status bar ── */
  .status-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(51,226,51,0.5), rgba(51,226,51,0.8), rgba(51,226,51,0.5), transparent);
    overflow: hidden;
  }
  .status-bar::after {
    content: '';
    position: absolute;
    top: 0; height: 3px; width: 25%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
    animation: shimBar 5s linear infinite;
  }
  @keyframes shimBar {
    from { left: -25%; }
    to   { left: 125%; }
  }

  /* ── Top bar ── */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(51,226,51,0.4), rgba(51,226,51,0.7), rgba(51,226,51,0.4), transparent);
    overflow: hidden;
  }
  .top-bar::after {
    content: '';
    position: absolute;
    top: 0; height: 3px; width: 25%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
    animation: shimBar 5s linear infinite;
    animation-delay: -2.5s;
  }

  /* ── Wordmark ── */
  .wordmark {
    position: absolute;
    top: 44px; left: 56px;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(255,255,255,0.18);
  }

  /* ── Live badge ── */
  .live-badge {
    position: absolute;
    top: 44px; right: 56px;
    display: flex; align-items: center; gap: 10px;
    background: rgba(51,226,51,0.08);
    border: 1px solid rgba(51,226,51,0.22);
    border-radius: 100px;
    padding: 8px 18px;
    animation: badgePulse 3s ease-in-out infinite;
  }
  @keyframes badgePulse {
    0%, 100% { border-color: rgba(51,226,51,0.22); background: rgba(51,226,51,0.08); }
    50%       { border-color: rgba(51,226,51,0.38); background: rgba(51,226,51,0.12); }
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #33e233;
    animation: livePulse 1.4s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%, 100% { opacity: 0.3; transform: scale(0.9); }
    50%       { opacity: 1.0; transform: scale(1.1); }
  }
  .live-text {
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: #33e233;
  }
</style>
</head>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1920, H = 1080;
const GREEN = '#33e233';
const GREEN_RGB = [51, 226, 51];

// ── Particles ──
const particles = Array.from({ length: 55 }, (_, i) => {
  const seed = i * 173.3 + 17;
  return {
    x0: ((seed % (W + 200)) - 100),

});

// ── Bokeh ──
const bokeh = Array.from({ length: 10 }, (_, i) => {

    x0: ((seed % (W + 300)) - 150),

  const alpha = 0.06 + pulse * 0.04;
  const grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.55);
  grd.addColorStop(0, `rgba(${GREEN_RGB},${alpha})`);
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.save();
  ctx.scale(1, H / W * 0.82);
  ctx.translate(0, W * (1 - H / W * 0.82) / 2);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, W);
  ctx.restore();
}

let startTime = null;

function draw(ts) {
  if (!startTime) startTime = ts;
  const t = (ts - startTime) / 1000; // seconds
  const frame = t * 60; // equivalent frames at 60fps

  ctx.clearRect(0, 0, W, H);

  // Center glow
  drawCenterGlow(t);

  // Bokeh
  bokeh.forEach(b => {
    const drift = Math.sin(frame * b.driftFreq + b.driftPhase) * b.driftAmp;
    const x = b.x0 + drift;
    const rawY = b.y0 + frame * b.speed;
    const y = (rawY % (H + 120)) - 60;

    ctx.save();
    ctx.filter = `blur(${b.blur}px)`;
    ctx.globalAlpha = b.opacity;
    ctx.beginPath();
    ctx.ellipse(x, y, b.rx, b.ry, 0, 0, Math.PI * 2);
    ctx.fillStyle = GREEN;
    ctx.fill();
    ctx.restore();
  });

  // Particles
  ctx.globalAlpha = 1;
  particles.forEach(p => {
    const drift = Math.sin(frame * p.driftFreq + p.driftPhase) * p.driftAmp;
    const x = p.x0 + drift;
    const rawY = p.y0 + frame * p.speed;
    const y = (rawY % (H + 100)) - 50;
    ctx.globalAlpha = p.opacity;
    ctx.beginPath();
    ctx.arc(x, y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = GREEN;
    ctx.fill();
  });

  // Scan sweep line
  ctx.globalAlpha = 1;
  const scanY = (frame * 0.7) % (H + 40) - 20;
  ctx.globalAlpha = 0.045;
  ctx.strokeStyle = GREEN;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, scanY);
  ctx.lineTo(W, scanY);
  ctx.stroke();

  ctx.globalAlpha = 1;
  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
